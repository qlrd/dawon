<!-- Mascot placeholder — replace with final artwork -->
<!-- Style: adult cartoon (Roger Rabbit / Who Framed Roger Rabbit) -->
<!-- Character: Dawon — the divine lion who carries Mahakali -->
<!--            Here depicted as an elegant, powerful feline -->
<!--            in 42 School inspector uniform -->
<!-- Palette: #CC1111 rouge · #111111 noir · #F7F5EE blanc · #CC8800 or -->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 400 560"
     width="400" height="560">

  <rect width="400" height="560" fill="#F7F5EE"/>

  <!-- Placeholder silhouette -->
  <g fill="none" stroke="#111111" stroke-width="2.5">
    <!-- Body outline -->
    <ellipse cx="200" cy="320" rx="90" ry="120" fill="#CC1111" stroke="#111111"/>
    <!-- Head -->
    <circle cx="200" cy="170" r="70" fill="#CC8800" stroke="#111111"/>
    <!-- Ears -->
    <polygon points="145,115 130,60 170,100" fill="#CC8800" stroke="#111111"/>
    <polygon points="255,115 270,60 230,100" fill="#CC8800" stroke="#111111"/>
    <!-- Inner ears -->
    <polygon points="148,110 138,75 165,100" fill="#CC1111"/>
    <polygon points="252,110 262,75 235,100" fill="#CC1111"/>
    <!-- Eyes -->
    <ellipse cx="178" cy="165" rx="14" ry="16" fill="#F7F5EE" stroke="#111111"/>
    <ellipse cx="222" cy="165" rx="14" ry="16" fill="#F7F5EE" stroke="#111111"/>
    <circle cx="181" cy="168" r="8" fill="#111111"/>
    <circle cx="225" cy="168" r="8" fill="#111111"/>
    <circle cx="184" cy="165" r="3" fill="#F7F5EE"/>
    <circle cx="228" cy="165" r="3" fill="#F7F5EE"/>
    <!-- Nose -->
    <ellipse cx="200" cy="192" rx="9" ry="6" fill="#CC1111"/>
    <!-- Muzzle -->
    <ellipse cx="200" cy="200" rx="22" ry="15" fill="#F7F5EE" stroke="#111111"/>
    <!-- Mouth -->
    <path d="M188,205 Q200,215 212,205" stroke="#111111" stroke-width="2" fill="none"/>
    <!-- Inspector badge / uniform collar -->
    <rect x="170" y="225" width="60" height="30" rx="4"
          fill="#CC8800" stroke="#111111"/>
    <text x="200" y="244" text-anchor="middle"
          font-family="serif" font-size="9" fill="#111111">DAWON</text>
    <!-- Claws / paws -->
    <ellipse cx="130" cy="370" rx="28" ry="18" fill="#CC8800" stroke="#111111"/>
    <ellipse cx="270" cy="370" rx="28" ry="18" fill="#CC8800" stroke="#111111"/>
    <!-- Tail -->
    <path d="M280,400 Q340,350 320,290 Q310,260 290,280"
          stroke="#CC8800" stroke-width="12" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Motto -->
  <text x="200" y="500" text-anchor="middle"
        font-family="serif" font-size="13" fill="#111111" font-style="italic">
    "I am not here to be gentle."
  </text>
  <text x="200" y="520" text-anchor="middle"
        font-family="serif" font-size="10" fill="#CC1111">
    "I am here so moulinette does not have to be harsh."
  </text>
  <text x="200" y="545" text-anchor="middle"
        font-family="serif" font-size="9" fill="#CC8800">
    Dawon · Conservatoire de Paris XLII
  </text>

</svg>
