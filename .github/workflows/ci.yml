name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: test / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@4305c38b25d97ef35a8ad1f985ccf2d2242004f2 # stable
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Install valgrind
        if: runner.os == 'Linux'
        run: sudo apt-get update -qq && sudo apt-get install -y valgrind

      - name: Cache Cargo registry
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: cargo fmt --check
        run: cargo fmt --check

      - name: cargo clippy
        run: cargo clippy -- -D warnings

      - name: cargo test
        run: cargo test

      - name: Install uv
        uses: astral-sh/setup-uv@f0ec1fc3b38f5e7cd731bb6ce540c5af426746bb # v6.1.0
        with:
          version: "0.10.8"

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.13"

      - name: Install norminette
        run: python -m pip install norminette

      - name: pytest
        run: cd tests/python && uv run pytest -q

  debian:
    name: test / debian-stable / rust-${{ matrix.toolchain }}
    runs-on: ubuntu-latest
    container: debian:stable
    env:
      CARGO_HOME: /root/.cargo
      RUSTUP_HOME: /root/.rustup
    strategy:
      fail-fast: false
      matrix:
        toolchain:
          - stable
          - "1.85"   # MSRV — driven by getrandom 0.4 (via tempfile)

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install system dependencies
        run: |
          apt-get update -qq
          apt-get install -y --no-install-recommends \
            curl gcc libc6-dev valgrind python3 python3-pip ca-certificates

      - name: Install Rust ${{ matrix.toolchain }}
        run: |
          curl -sSf https://sh.rustup.rs \
            | sh -s -- -y --profile minimal --default-toolchain ${{ matrix.toolchain }} \
              --component rustfmt --component clippy
          echo "$CARGO_HOME/bin" >> "$GITHUB_PATH"

      - name: Install norminette
        run: pip3 install norminette --break-system-packages

      - name: cargo fmt --check
        if: matrix.toolchain == 'stable'
        run: cargo fmt --check

      - name: cargo clippy
        if: matrix.toolchain == 'stable'
        run: cargo clippy -- -D warnings

      - name: cargo test
        run: cargo test
